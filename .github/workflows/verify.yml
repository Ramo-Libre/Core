name: CI Verification

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  verify:
    name: 🛡️ Verify & Test Core
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout Code
        uses: actions/checkout@v4

      - name: 🍞 Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: 🧶 Install Dependencies
        run: bun install --frozen-lockfile

      - name: 🧪 Run Tests
        run: bun test

      - name: 🛡️ Type Check Parser
        run: cd packages/dsl-parser && bun run build

      - name: 🛡️ Type Check UI Themes
        run: cd packages/ui-themes && bun run build
